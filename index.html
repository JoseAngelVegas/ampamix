<!DOCTYPE html>

<html>

<body>

<head>

 <img class="menu" onclick="audio()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Audio.png?raw=true" width="150" height="150">
 <img class="menu" onclick="texto()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Texto.png?raw=true" width="150" height="150">
 <img class="menu" onclick="videos()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Videos.png?raw=true" width="150" height="150">

 <script>

  function audio() {

      const cerrarInicio = document.querySelectorAll(".menu");
      for (let i = 0; i < cerrarInicio.length; i++) {
         cerrarInicio[i].style.width = "0px";
         cerrarInicio[i].style.height = "0px";
         cerrarInicio[i].style.visibility = "hidden";
         
      }
  }

  function texto() {

      const cerrarInicio = document.querySelectorAll(".menu");
      for (let i = 0; i < cerrarInicio.length; i++) {
         cerrarInicio[i].style.width = "0px";
         cerrarInicio[i].style.height = "0px";
         cerrarInicio[i].style.visibility = "hidden";
         
      }
  }

  function video() {

      const cerrarInicio = document.querySelectorAll(".menu");
      for (let i = 0; i < cerrarInicio.length; i++) {
         cerrarInicio[i].style.width = "0px";
         cerrarInicio[i].style.height = "0px";
         cerrarInicio[i].style.visibility = "hidden";
         
      }
  }

  </script>

   <style>

    .menu {
     box-shadow: 0px 0px 5px black;
    border-radius: 20px;
    margin: 0 auto;
    display: flex;
    }

      body {
background: #58df8c;
background: -webkit-linear-gradient(95deg, rgba(88, 223, 140, 1) 0%, rgba(91, 203, 207, 1) 44%, rgba(99, 201, 162, 1) 80%, rgba(83, 237, 219, 1) 100%);

filter: progid:DXImageTransform.Microsoft.gradient(startColorstr="#58DF8C", endColorstr="#53EDDB", GradientType=0);
      }

   @media only screen and (max-width:500px) {
            .button, .submit, .mas, .input {
               width: 40%;

         }

</style>
