<html>

<body>

<head>

<div class="menuCompleto">

 <img class="menuInterfaz" id="animacionMenu1" onclick="audio()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Audio.png?raw=true" width="150" height="150">
 
 <img class="menuInterfaz" id="animacionMenu2" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Texto.png?raw=true" width="150" height="150">
 
 <img class="menuInterfaz" id="animacionMenu3" onclick="video(), videoAnimacion()"  src="https://github.com/JoseAngelVegas/ampamix/blob/main/Videos.png?raw=true" width="150" height="150">


 
 </div>

 <div id="pantalla"></div>

<div class="video">
  <img id="animacion1" class="videoInterfaz" onclick="Josechicha()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Josechicha.png?raw=true" width="0" height="0">
  
  <img id="animacion2" class="videoInterfaz" onclick="Nosotros()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/La%20Superioridad%20De%20NOSOTROS.png?raw=true" width="0" height="0">
 </div>

 <script>

  function audio() {

      const cerrarInicio = document.querySelectorAll(".menu");
      for (let i = 0; i < cerrarInicio.length; i++) {
         cerrarInicio[i].style.width = "0px";
         cerrarInicio[i].style.height = "0px";
         cerrarInicio[i].style.visibility = "hidden";
         
      }
  }

  function texto() {

      const cerrarInicio = document.querySelectorAll(".menu");
      for (let i = 0; i < cerrarInicio.length; i++) {
         cerrarInicio[i].style.width = "0px";
         cerrarInicio[i].style.height = "0px";
         cerrarInicio[i].style.visibility = "hidden";
         
      }
  }

  function video() {

      const cerrarInicio = document.querySelectorAll(".menuInterfaz");
      for (let i = 0; i < cerrarInicio.length; i++) {
          cerrarInicio[i].style.animation = "cerrar 0.5s";
           cerrarInicio[i].style.animationFillMode = "both";

  
         
      }
      

    const abrir = document.querySelectorAll(".video, .videoInterfaz");
      for (let i = 0; i < abrir.length; i++) {
         abrir[i].style.width = "120px";
         abrir[i].style.height = "120px";
         
      }
      
      
  }

  </script>
  
  <script>
  
   function videoAnimacion() {
  var el = document.getElementById('animacionMenu3');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = null;
  
  document.getElementById('animacion1').style.animationPlayState = "running"
    document.getElementById('animacion2').style.animationPlayState = "running"
    
 document.getElementById('animacionMenu1').style.animationPlayState = "running"
    document.getElementById('animacionMenu2').style.animationPlayState = "running"
    
 document.getElementById('animacionMenu3').style.animationPlayState = "running"
 
 document.getElementById('pantalla').style.animationPlayState = "running"


  
}
  
  </script>


   <style>
   
   .menuCompleto {
        flex-direction: column;
          display: flex;
        gap: 50px;
}
    
    .menuInterfaz {
     position: relative;
     box-shadow: 0px 0px 5px black;
     border-radius: 20px;
     transform: translateY(50%);
     margin: 0 auto;
     display: flex;
     flex-direction: column;
     filter: blur (2px);
     }

#animacionMenu1 {
  animation: hola 1.3s infinite;
  animation-fill-mode: both;
  animation-play-state: running;
    }
    
    #animacionMenu2 {
  animation: hola 1.2s infinite;
  animation-fill-mode: both;
  animation-play-state: running;
    }
    
      #animacionMenu3 {
  animation: hola 1.1s infinite;
  animation-fill-mode: both;
  animation-play-state: running;
    }
    
     .menu {
    position: relative;
    gap: 50px;
    display: flex;
    margin: 0 auto;
    box-shadow: 0px 0px 5px black;
     border-radius: 20px;
     transform: translateY(50%);

    }
    

    #pantalla {
     background-color: black;
     width: 0%;
     height: 0%;
     opacity: 30%;
     position: fixed;
     animation: animacionPantalla 0.5s;
     animation-fill-mode: both;
     animation-play-state: paused;
    }

    .video {
    position: relative;
    gap: 50px;
    display: flex;
    flex-direction: column;
    margin: 0 auto;
    }
    
    .videoInterfaz { 
    position: relative;
    box-shadow: 0px 5px 20px black;
    border-radius: 100px;
    transform: translateY(-100%);
   
    }
    
    #animacion1 {
  position: relative;
  animation: bounce 0.3s;
  animation-fill-mode: both;
  animation-play-state: paused;

}

#animacion2 {
  position: relative;
  animation: bounce 0.5s;
  animation-fill-mode: both;
  animation-play-state: paused;


}

@keyframes cerrar {
  0% {  opacity: 100%; top: 0px; width: 150px; height: 150px; }
  100% { opacity: 0%; top: 300px; width: 80px; height: 80px; }
}

@keyframes hola {
  0% { width: 150px; height: 150px; }
  50% { width: 148px; height: 148px; }
  100% { width: 150px; height: 150px; }
}

@keyframes bounce {
  0% { top: -10px; width: 0px; height: 0px; }
  100% { top: -280px; width: 120px; height: 120px; }
}

@keyframes animacionPantalla {
  0% { top: 0px; width: 0px; height: 0px; }
  100% { top: 0px; width: 100%; height: 100%; }
}

      body {
background: #58df8c;
background: -webkit-linear-gradient(95deg, rgba(88, 223, 140, 1) 0%, rgba(91, 203, 207, 1) 44%, rgba(99, 201, 162, 1) 80%, rgba(83, 237, 219, 1) 100%);
background: -moz-linear-gradient(95deg, rgba(88, 223, 140, 1) 0%, rgba(91, 203, 207, 1) 44%, rgba(99, 201, 162, 1) 80%, rgba(83, 237, 219, 1) 100%);
background: linear-gradient(95deg, rgba(88, 223, 140, 1) 0%, rgba(91, 203, 207, 1) 44%, rgba(99, 201, 162, 1) 80%, rgba(83, 237, 219, 1) 100%);
filter: progid:DXImageTransform.Microsoft.gradient(startColorstr="#58DF8C", endColorstr="#53EDDB", GradientType=0);
      }

   @media only screen and (max-width:500px) {
            .button, .submit, .mas, .input {
               width: 40%;
            }
         }

</style>

</body>

</head>

</html>
