<head>

 <img class="menu" onclick="audio()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Audio.png?raw=true" width="150" height="150">
 <img class="menu" onclick="texto()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Texto.png?raw=true" width="150" height="150">
 <img class="menu" onclick="video()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Videos.png?raw=true" width="150" height="150">

 <div></div>

  <img class="video" onclick="Josechicha()" src="https://github.com/JoseAngelVegas/ampamix/blob/main/Josechicha.png?raw=true" width="0" height="0">

 <script>

  function audio() {

      const cerrarInicio = document.querySelectorAll(".menu");
      for (let i = 0; i < cerrarInicio.length; i++) {
         cerrarInicio[i].style.width = "0px";
         cerrarInicio[i].style.height = "0px";
         cerrarInicio[i].style.visibility = "hidden";
         
      }
  }

  function texto() {

      const cerrarInicio = document.querySelectorAll(".menu");
      for (let i = 0; i < cerrarInicio.length; i++) {
         cerrarInicio[i].style.width = "0px";
         cerrarInicio[i].style.height = "0px";
         cerrarInicio[i].style.visibility = "hidden";
         
      }
  }

  function video() {

      const cerrarInicio = document.querySelectorAll(".menu");
      for (let i = 0; i < cerrarInicio.length; i++) {
         cerrarInicio[i].style.filter = "blur(5px)";
         
         
      }

    const abrir = document.querySelectorAll(".video");
      for (let i = 0; i < abrir.length; i++) {
         abrir[i].style.width = "120px";
         abrir[i].style.height = "120px";
         
      }
  }

  </script>

   <style>
